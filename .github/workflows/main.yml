name: Django CI/CD with Docker & S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    env:
      # ✅ GitHub Secrets for AWS and Django
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_STORAGE_BUCKET_NAME: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
      AWS_S3_REGION_NAME: ${{ secrets.AWS_S3_REGION_NAME }}
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DJANGO_DEBUG: 0

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Start Docker Compose
        run: |
          docker compose up -d --build

      - name: Wait for Django to Start
        run: sleep 10

      - name: Run Django Migrations
        run: docker compose exec web python3 manage.py migrate --noinput

      - name: Collect Static Files
        run: docker compose exec web python3 manage.py collectstatic --noinput

      - name: Test Django Admin URL
        run: |
          echo "You can now access your admin at your server URL"

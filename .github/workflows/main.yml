name: Django CI/CD with Docker & S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ SAFE .env creation (NO PARSING ISSUE)
      - name: Create .env file
        run: |
          printf "AWS_ACCESS_KEY_ID=%s\n" "${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
          printf "AWS_SECRET_ACCESS_KEY=%s\n" "${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          printf "AWS_STORAGE_BUCKET_NAME=%s\n" "${{ secrets.AWS_STORAGE_BUCKET_NAME }}" >> .env
          printf "AWS_S3_REGION_NAME=%s\n" "${{ secrets.AWS_S3_REGION_NAME }}" >> .env
          printf "DJANGO_SECRET_KEY=%s\n" "${{ secrets.DJANGO_SECRET_KEY }}" >> .env
          printf "DJANGO_DEBUG=%s\n" "${{ secrets.DJANGO_DEBUG }}" >> .env

      # (Optional Debug)
      - name: Check .env file
        run: cat .env

      # ✅ Build Docker
      - name: Build & Start Docker Compose
        run: docker compose up -d --build

      # ✅ Wait until container is ready (safe method)
      - name: Wait for Django container
        run: |
          for i in {1..20}; do
            docker compose ps
            docker compose exec web python3 manage.py check && break
            sleep 3
          done

      # ✅ Migrations
      - name: Run Migrations
        run: docker compose exec web python3 manage.py migrate --noinput

      # ✅ Static files (SAFE for S3)
      - name: Collect Static Files
        run: docker compose exec web python3 manage.py collectstatic --noinput

      # ✅ Done
      - name: Success
        run: echo "CI/CD Pipeline completed successfully 🚀"
